<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>現場利益率管理（マスター強化版）</title>
  <style>
    body { font-family: Arial; padding:20px; background:#f5f5f5; }
    input, select, button { padding:6px; margin:4px; }
    .card { background:white; padding:15px; border-radius:10px; margin-bottom:20px; }
  </style>
</head>
<body>

<div class="card">
  <h2>現場入力</h2>

  <input id="siteName" placeholder="現場名"><br>

  <!-- 作業員選択（マスター） -->
  <h3>作業員（単価別）</h3>
  <div id="workerSelect"></div>

  <!-- 作業員マスター登録 -->
  <input id="newWorkerName" placeholder="作業員名">
  <input id="newWorkerCost" type="number" placeholder="単価">
  <button onclick="addWorker()">作業員追加</button>

  <!-- 材料 -->
  <h3>材料（複数）</h3>
  <div id="materials"></div>

  <input id="newMaterialName" placeholder="材料名">
  <input id="newMaterialCost" type="number" placeholder="単価">
  <button onclick="addMaterial()">材料追加</button>

  <!-- 車両 -->
  <select id="vehicle">
    <option value="0">車両なし</option>
    <option value="3000">軽自動車</option>
    <option value="8000">ダンプ</option>
  </select><br>

  <input id="revenue" type="number" placeholder="売上"><br>
  <button onclick="calculate()">計算</button>

  <p id="result"></p>
</div>

<script>
// =====================
// マスター管理
// =====================
function getWorkers(){
  return JSON.parse(localStorage.getItem('workers')||'[]');
}
function saveWorkers(data){
  localStorage.setItem('workers', JSON.stringify(data));
}

function getMaterials(){
  return JSON.parse(localStorage.getItem('materials')||'[]');
}
function saveMaterials(data){
  localStorage.setItem('materials', JSON.stringify(data));
}

// =====================
// 作業員UI
// =====================
function renderWorkers(){
  const div = document.getElementById('workerSelect');
  div.innerHTML='';

  const workers = getWorkers();

  for(let i=0;i<10;i++){
    const select = document.createElement('select');
    select.className='worker';

    const empty = document.createElement('option');
    empty.value='';
    empty.text='選択';
    select.appendChild(empty);

    workers.forEach(w=>{
      const opt = document.createElement('option');
      opt.value = w.cost;
      opt.text = `${w.name} (${w.cost})`;
      select.appendChild(opt);
    });

    div.appendChild(select);
  }
}

function addWorker(){
  const name = document.getElementById('newWorkerName').value;
  const cost = Number(document.getElementById('newWorkerCost').value);

  if(!name || !cost) return alert('入力してください');

  const workers = getWorkers();
  workers.push({name, cost});
  saveWorkers(workers);

  renderWorkers();
}

// =====================
// 材料UI（複数追加）
// =====================
function renderMaterials(){
  const div = document.getElementById('materials');
  div.innerHTML='';

  const materials = getMaterials();

  for(let i=0;i<20;i++){
    const select = document.createElement('select');
    select.className='material';

    const empty = document.createElement('option');
    empty.value='0';
    empty.text='なし';
    select.appendChild(empty);

    materials.forEach(m=>{
      const opt = document.createElement('option');
      opt.value = m.cost;
      opt.text = `${m.name} (${m.cost})`;
      select.appendChild(opt);
    });

    div.appendChild(select);
  }
}

function addMaterial(){
  const name = document.getElementById('newMaterialName').value;
  const cost = Number(document.getElementById('newMaterialCost').value);

  if(!name || !cost) return alert('入力してください');

  const materials = getMaterials();
  materials.push({name, cost});
  saveMaterials(materials);

  renderMaterials();
}

// =====================
// 計算
// =====================

  const revenue = Number(document.getElementById('revenue').value)||0;
  const vehicle = Number(document.getElementById('vehicle').value)||0;

  const workerEls = document.querySelectorAll('.worker');
  let labor=0;
  workerEls.forEach(w=>{
    labor += Number(w.value)||0;
