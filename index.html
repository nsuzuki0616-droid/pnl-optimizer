<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>現場管理アプリ</title>
</head>
<body>

<h2>■ 材料マスター</h2>
<input id="matName" placeholder="材料名">
<input id="matCost" type="number" placeholder="単価">
<button id="addMatBtn">追加</button>

<div id="materialMaster"></div>

<hr>

<h2>■ 現場入力</h2>
<input id="siteName" placeholder="現場名"><br>
<input id="revenue" type="number" placeholder="売上"><br>

<h3>材料（20件）</h3>
<div id="materialInputs"></div>

  <!-- 人工 -->
  <h3>人工（8人）</h3>
<div id="workers"></div>
  
<!-- 重機 -->
<h3>重機（5台）</h3>
<div id="machines"></div>

 <!-- 車両 -->
   <h3>車両（5台）</h3>
<div id="vehicles"></div>

<h3>計算結果</h3>
<p id="costResult">ここに結果が出ます</p>
  
<button id="saveBtn">保存</button>
  
<hr>

<h2>■ 現場一覧</h2>
<div id="siteList"></div>

<script>
// =====================
// 初期化
// =====================
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('addMatBtn').addEventListener('click', addMaterial);
  document.getElementById('saveBtn').addEventListener('click', saveSite);
  document.addEventListener('input', calculatePreview);

  renderMaterialMaster();
  renderMaterialInputs();
  renderSites();
  renderWorkers();
  renderVehicles();
renderMachines();
});

// =====================
// 材料マスター
// =====================
function getMaterials(){
  return JSON.parse(localStorage.getItem('materials') || '[]');
}

function saveMaterials(data){
  localStorage.setItem('materials', JSON.stringify(data));
}

function addMaterial(){
  const name = document.getElementById('matName').value.trim();
  const cost = Number(document.getElementById('matCost').value);

  if(!name || !cost){
    alert('入力してください');
    return;
  }

  const materials = getMaterials();
  materials.push({name, cost});
  saveMaterials(materials);

  document.getElementById('matName').value='';
  document.getElementById('matCost').value='';

  renderMaterialMaster();
  renderMaterialInputs();
}

function renderMaterialMaster(){
  const div = document.getElementById('materialMaster');
  div.innerHTML='';

  const materials = getMaterials();

  materials.forEach((m,i)=>{
    const row = document.createElement('div');

    const name = document.createElement('input');
    name.value = m.name;

    const cost = document.createElement('input');
    cost.type='number';
    cost.value = m.cost;

    const saveBtn = document.createElement('button');
    saveBtn.innerText='更新';
    saveBtn.onclick=()=>{
      materials[i] = { name:name.value, cost:Number(cost.value)};
      saveMaterials(materials);
      renderMaterialMaster();
      renderMaterialInputs();
    };

    const delBtn = document.createElement('button');
    delBtn.innerText='削除';
    delBtn.onclick=()=>{
      if(confirm('削除しますか？')){
        materials.splice(i,1);
        saveMaterials(materials);
        renderMaterialMaster();
        renderMaterialInputs();
      }
    };

    row.appendChild(name);
    row.appendChild(cost);
    row.appendChild(saveBtn);
    row.appendChild(delBtn);

    div.appendChild(row);
  });
}

// =====================
// 材料入力
// =====================
function renderMaterialInputs(){
  const div = document.getElementById('materialInputs');
  div.innerHTML='';

  const materials = getMaterials();

  for(let i=0;i<20;i++){
    const wrapper = document.createElement('div');

    const select = document.createElement('select');
    select.className='matSel';

    const empty = document.createElement('option');
    empty.value='0';
    empty.text='なし';
    select.appendChild(empty);

    materials.forEach(m=>{
      const opt = document.createElement('option');
      opt.value = m.cost;
      opt.text = `${m.name} (${m.cost})`;
      select.appendChild(opt);
    });

    const qty = document.createElement('input');
    qty.type='number';
    qty.value=1;
    qty.className='matQty';

    wrapper.appendChild(select);
    wrapper.appendChild(qty);
    div.appendChild(wrapper);
  }
}

  // =====================
// 人工
// =====================
function renderWorkers(){
  const div = document.getElementById('workers');
  div.innerHTML='';

  const workerList = [
    {name:'西田', day:38000, hour:4000},
    {name:'関口', day:38000, hour:4000},
    {name:'川田', day:35000, hour:3500},
    {name:'鈴木', day:20000, hour:2500},
    {name:'作業員①', day:15000, hour:2000},
    {name:'作業員②', day:15000, hour:2000},
    {name:'作業員③', day:15000, hour:2000}
  ];

  for(let i=0;i<8;i++){
    const row = document.createElement('div');

    // 作業員選択
    const select = document.createElement('select');
    select.className='workerSel';

    const empty = document.createElement('option');
    empty.value='';
    empty.text='選択';
    select.appendChild(empty);

    workerList.forEach(w=>{
      const opt = document.createElement('option');
      opt.value = JSON.stringify(w);
      opt.text = w.name;
      select.appendChild(opt);
    });

    // 日 or 時間
    const type = document.createElement('select');
    type.className='workType';
    type.innerHTML = `
      <option value="day">日</option>
      <option value="hour">時間</option>
    `;

    // 時間入力
    const hour = document.createElement('input');
    hour.type='number';
    hour.placeholder='時間';
    hour.className='workHour';
    hour.value=8;

    row.appendChild(select);
    row.appendChild(type);
    row.appendChild(hour);

    div.appendChild(row);
  }
}
 // =====================
// 車両・重機のプルダウン
// =====================
  // 車両
function renderVehicles(){
  const div = document.getElementById('vehicles');
  div.innerHTML='';

  const vehicleList = [
    {name:'軽自動車', cost:3000},
    {name:'3ｔダンプ', cost:8000},
    {name:'4ｔダンプ', cost:10000}
  ];

  for(let i=0;i<5;i++){
    const select = document.createElement('select');
    select.className='vehicleSel';

    const empty = document.createElement('option');
    empty.value='0';
    empty.text='選択なし';
    select.appendChild(empty);

    vehicleList.forEach(v=>{
      const opt = document.createElement('option');
      opt.value = v.cost;
      opt.text = `${v.name} (${v.cost})`;
      select.appendChild(opt);
    });

    div.appendChild(select);
  }
}

// 重機
function renderMachines(){
  const div = document.getElementById('machines');
  div.innerHTML='';

  const machineList = [
    {name:'ユンボ0.1t', cost:15000},
    {name:'ユンボ0.07t', cost:12000},
    {name:'バックホー', cost:20000}
  ];

  for(let i=0;i<5;i++){
    const select = document.createElement('select');
    select.className='machineSel';

    const empty = document.createElement('option');
    empty.value='0';
    empty.text='選択なし';
    select.appendChild(empty);

    machineList.forEach(m=>{
      const opt = document.createElement('option');
      opt.value = m.cost;
      opt.text = `${m.name} (${m.cost})`;
      select.appendChild(opt);
    });

    div.appendChild(select);
  }
}
// =====================
// 現場保存
// =====================
function getSites(){
  return JSON.parse(localStorage.getItem('sites') || '[]');
}

function saveSites(data){
  localStorage.setItem('sites', JSON.stringify(data));
}

function saveSite(){
  const siteName = document.getElementById('siteName').value;
  const revenue = Number(document.getElementById('revenue').value)||0;

  if(!siteName){
    alert('現場名を入力');
    return;
  }

  // 材料
  let materialCost=0;
  const mats = document.querySelectorAll('.matSel');
  const qtys = document.querySelectorAll('.matQty');

  mats.forEach((m,i)=>{
    materialCost += (Number(m.value)||0) * (Number(qtys[i].value)||0);
  });

  // 人工
  let laborCost = 0;
  const workers = document.querySelectorAll('.workerSel');
  const types = document.querySelectorAll('.workType');
  const hours = document.querySelectorAll('.workHour');

  workers.forEach((w,i)=>{
    if(!w.value) return;

    const data = JSON.parse(w.value);
    const type = types[i].value;

    if(type === 'day'){
      laborCost += data.day;
    }else{
      laborCost += data.hour * (Number(hours[i].value)||0);
    }
  });

// 車両合計
let vehicleCost = 0;
document.querySelectorAll('.vehicleSel').forEach(v=>{
  vehicleCost += Number(v.value)||0;
});

// 重機合計
let machineCost = 0;
document.querySelectorAll('.machineSel').forEach(m=>{
  machineCost += Number(m.value)||0;
});

  // 利益
  const totalCost = materialCost + laborCost + vehicleCost + machineCost;
  const profit = revenue - totalCost;
  const margin = revenue ? (profit/revenue)*100 : 0;

  document.getElementById('costResult').innerText =
  `材料:${materialCost}円 
人工:${laborCost}円 
車両:${vehicleCost}円 
重機:${machineCost}円

合計:${totalCost}円
利益:${profit}円 (${margin.toFixed(1)}%)`;

  // if(profit < 0){
   // result.style.color = 'red';
  //}else{
   // result.style.color = 'green';

  const sites = getSites();
  sites.push({ siteName, profit, margin });
  saveSites(sites);

  alert('保存しました');
  renderSites();
}

// =====================
// 表示
// =====================
function renderSites(){
  const div = document.getElementById('siteList');
  div.innerHTML='';

  const sites = getSites();

  sites.forEach((s,i)=>{
    const row = document.createElement('div');

    row.innerText = `${s.siteName} / 利益:${s.profit}円 (${s.margin.toFixed(1)}%) `;

    const del = document.createElement('button');
    del.innerText='削除';
    del.onclick=()=>{
      if(confirm('削除しますか？')){
        sites.splice(i,1);
        saveSites(sites);
        renderSites();
      }
    };

    row.appendChild(del);
    div.appendChild(row);
  });
}
</script>

</body>
</html>
