<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>現場管理アプリ</title>
</head>
<body>

<h2>■ 材料マスター</h2>
<input id="matName" placeholder="材料名">
<input id="matCost" type="number" placeholder="単価">
<button id="addMatBtn">追加</button>

<div id="materialMaster"></div>

<hr>

<h2>■ 現場入力</h2>
<input id="siteName" placeholder="現場名"><br>
<input id="revenue" type="number" placeholder="売上"><br>

<h3>材料（20件）</h3>
<div id="materialInputs"></div>

<button id="saveBtn">保存</button>

<hr>

<h2>■ 現場一覧</h2>
<div id="siteList"></div>

<script>
// =====================
// 初期化
// =====================
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('addMatBtn').addEventListener('click', addMaterial);
  document.getElementById('saveBtn').addEventListener('click', saveSite);

  renderMaterialMaster();
  renderMaterialInputs();
  renderSites();
});

// =====================
// 材料マスター
// =====================
function getMaterials(){
  return JSON.parse(localStorage.getItem('materials') || '[]');
}

function saveMaterials(data){
  localStorage.setItem('materials', JSON.stringify(data));
}

function addMaterial(){
  const name = document.getElementById('matName').value.trim();
  const cost = Number(document.getElementById('matCost').value);

  if(!name || !cost){
    alert('入力してください');
    return;
  }

  const materials = getMaterials();
  materials.push({name, cost});
  saveMaterials(materials);

  document.getElementById('matName').value='';
  document.getElementById('matCost').value='';

  renderMaterialMaster();
  renderMaterialInputs();
}

function renderMaterialMaster(){
  const div = document.getElementById('materialMaster');
  div.innerHTML='';

  const materials = getMaterials();

  materials.forEach((m,i)=>{
    const row = document.createElement('div');

    const name = document.createElement('input');
    name.value = m.name;

    const cost = document.createElement('input');
    cost.type='number';
    cost.value = m.cost;

    const saveBtn = document.createElement('button');
    saveBtn.innerText='更新';
    saveBtn.onclick=()=>{
      materials[i] = { name:name.value, cost:Number(cost.value)};
      saveMaterials(materials);
      renderMaterialMaster();
      renderMaterialInputs();
    };

    const delBtn = document.createElement('button');
    delBtn.innerText='削除';
    delBtn.onclick=()=>{
      if(confirm('削除しますか？')){
        materials.splice(i,1);
        saveMaterials(materials);
        renderMaterialMaster();
        renderMaterialInputs();
      }
    };

    row.appendChild(name);
    row.appendChild(cost);
    row.appendChild(saveBtn);
    row.appendChild(delBtn);

    div.appendChild(row);
  });
}

// =====================
// 材料入力
// =====================
function renderMaterialInputs(){
  const div = document.getElementById('materialInputs');
  div.innerHTML='';

  const materials = getMaterials();

  for(let i=0;i<20;i++){
    const wrapper = document.createElement('div');

    const select = document.createElement('select');
    select.className='matSel';

    const empty = document.createElement('option');
    empty.value='0';
    empty.text='なし';
    select.appendChild(empty);

    materials.forEach(m=>{
      const opt = document.createElement('option');
      opt.value = m.cost;
      opt.text = `${m.name} (${m.cost})`;
      select.appendChild(opt);
    });

    const qty = document.createElement('input');
    qty.type='number';
    qty.value=1;
    qty.className='matQty';

    wrapper.appendChild(select);
    wrapper.appendChild(qty);
    div.appendChild(wrapper);
  }
}

// =====================
// 現場保存
// =====================
function getSites(){
  return JSON.parse(localStorage.getItem('sites') || '[]');
}

function saveSites(data){
  localStorage.setItem('sites', JSON.stringify(data));
}

function saveSite(){
  const siteName = document.getElementById('siteName').value;
  const revenue = Number(document.getElementById('revenue').value)||0;

  if(!siteName){
    alert('現場名を入力');
    return;
  }

  let materialCost=0;

  const mats = document.querySelectorAll('.matSel');
  const qtys = document.querySelectorAll('.matQty');

  mats.forEach((m,i)=>{
    materialCost += (Number(m.value)||0) * (Number(qtys[i].value)||0);
  });

  const profit = revenue - materialCost;
  const margin = revenue ? (profit/revenue)*100 : 0;

  const sites = getSites();
  sites.push({ siteName, profit, margin });
  saveSites(sites);

  alert('保存しました');
  renderSites();
}

// =====================
// 表示
// =====================
function renderSites(){
  const div = document.getElementById('siteList');
  div.innerHTML='';

  const sites = getSites();

  sites.forEach((s,i)=>{
    const row = document.createElement('div');

    row.innerText = `${s.siteName} / 利益:${s.profit}円 (${s.margin.toFixed(1)}%) `;

    const del = document.createElement('button');
    del.innerText='削除';
    del.onclick=()=>{
      if(confirm('削除しますか？')){
        sites.splice(i,1);
        saveSites(sites);
        renderSites();
      }
    };

    row.appendChild(del);
    div.appendChild(row);
  });
}
</script>

</body>
</html>


</body>
</html>
