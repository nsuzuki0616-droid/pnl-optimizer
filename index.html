<input id="revenue" type="date" placeholder="売上"><br>

  </select><br>

  <!-- 材料　-->
<h2>材料マスター登録</h2>
<input id="matName" placeholder="材料名">
<input id="matCost" type="number" placeholder="単価">
<button id="addMatBtn">追加</button>

<div id="materialMaster"></div>

  <h3>材料選択（20件）</h3>
<div id="materialInputs"></div>

<button onclick="saveSite()">保存</button>

  <!-- 移動 -->
  <input id="distance" type="number" placeholder="移動距離(km)">
  <input id="time" type="number" placeholder="移動時間(h)"><br>

  
<input id="cost" type="number" placeholder="経費">
<button onclick="calculate()">計算</button>
<button onclick="saveSite()">保存</button>

  <p id="result"></p>
</div>


<hr>

<h2>現場一覧</h2>
<div id="siteList"></div>

// ===== 保存 =====
function getSites(){
  return JSON.parse(localStorage.getItem('sites') || '[]');
}

function saveSites(data){
  localStorage.setItem('sites', JSON.stringify(data));
}

function saveSite(){
  const siteName = document.getElementById('siteName').value;
  const revenue = Number(document.getElementById('revenue').value) || 0;
  const cost = Number(document.getElementById('cost').value) || 0;

  if(!siteName){
    alert('現場名を入力してください');
    return;
  }

  const profit = revenue - cost;
  const margin = revenue ? (profit / revenue) * 100 : 0;

  const sites = getSites();
  sites.push({ siteName, revenue, cost, profit, margin });
  saveSites(sites);

  alert('保存しました');
  renderSites();
}

  // ===== 計算式 =====
function calculate(){
  const revenue = Number(document.getElementById('revenue').value)||0;
  const other = Number(document.getElementById('other').value)||0;

  const vehicle = Number(document.getElementById('vehicle').value)||0;
  const material = Number(document.getElementById('material').value)||0;

  const distance = Number(document.getElementById('distance').value)||0;
  const time = Number(document.getElementById('time').value)||0;

  const workers = document.querySelectorAll('.worker');
  let labor = 0;
  workers.forEach(w=>{ if(w.value) labor += 20000; });

  const travelCost = distance * 50 + time * 1000;

  const totalCost = labor + vehicle + material + travelCost + other;
  const profit = revenue - totalCost;
  const margin = revenue ? (profit/revenue)*100 : 0;

  document.getElementById('result').innerText =
    `利益:${profit}円 / 利益率:${margin.toFixed(1)}%`;
}

function save(){
  const siteName = document.getElementById('siteName').value;
  const revenue = Number(document.getElementById('revenue').value)||0;
  const other = Number(document.getElementById('other').value)||0;

  const vehicle = Number(document.getElementById('vehicle').value)||0;
  const material = Number(document.getElementById('material').value)||0;

  const distance = Number(document.getElementById('distance').value)||0;
  const time = Number(document.getElementById('time').value)||0;

  const workers = Array.from(document.querySelectorAll('.worker'))
    .map(w=>w.value).filter(v=>v);

  const labor = workers.length * 20000;
  const travelCost = distance * 50 + time * 1000;

  const totalCost = labor + vehicle + material + travelCost + other;
  const profit = revenue - totalCost;
  const margin = revenue ? (profit/revenue)*100 : 0;

  const data = { siteName, workers, profit, margin };

  const saved = JSON.parse(localStorage.getItem('sites')||'[]');
  saved.push(data);
  localStorage.setItem('sites', JSON.stringify(saved));

  load();
}

function load(){
  const list = document.getElementById('list');
  list.innerHTML='';

  const saved = JSON.parse(localStorage.getItem('sites')||'[]');

  saved.forEach(d=>{
    const div = document.createElement('div');
    div.innerText = `${d.siteName} / ${d.profit}円 (${d.margin.toFixed(1)}%)`;
    list.appendChild(div);
  });
} 

// ===== 表示 =====
function renderSites(){
  const list = document.getElementById('siteList');
  list.innerHTML = '';

  const sites = getSites();

  sites.forEach((s, index) => {
    const div = document.createElement('div');

    const text = document.createElement('span');
    text.innerText = `${s.siteName} / 利益:${s.profit}円 (${s.margin.toFixed(1)}%) `;

    const delBtn = document.createElement('button');
    delBtn.innerText = '削除';
    delBtn.onclick = () => {
      if(confirm('削除しますか？')){
        const sites = getSites();
        sites.splice(index, 1);
        saveSites(sites);
        renderSites();
      }
    };

    div.appendChild(text);
    div.appendChild(delBtn);
    list.appendChild(div);
  });

// 現場保存
// =====================
function getSites(){
  return JSON.parse(localStorage.getItem('sites')||'[]');
}

function saveSites(data){
  localStorage.setItem('sites', JSON.stringify(data));
}

function saveSite(){
  const siteName = document.getElementById('siteName').value;
  const revenue = Number(document.getElementById('revenue').value)||0;

  let materialCost=0;
  document.querySelectorAll('.matSel').forEach((m,i)=>{
    const cost = Number(m.value)||0;
    const qty = Number(document.querySelectorAll('.matQty')[i].value)||0;
    materialCost += cost * qty;
  });

  const profit = revenue - materialCost;
  const margin = revenue ? (profit/revenue)*100 : 0;

  const sites = getSites();
  sites.push({ siteName, profit, margin });
  saveSites(sites);

  renderSites();
}

function renderSites(){
  const div = document.getElementById('siteList');
  div.innerHTML='';

  const sites = getSites();

  sites.forEach((s,i)=>{
    const row = document.createElement('div');

    row.innerText = `${s.siteName} / ${s.profit}円 (${s.margin.toFixed(1)}%)`;

    const del = document.createElement('button');
    del.innerText='削除';
    del.onclick=()=>{
      if(confirm('削除しますか？')){
        sites.splice(i,1);
        saveSites(sites);
        renderSites();
      }
    };

    row.appendChild(del);
    div.appendChild(row);
  });
}

// 初期
renderMaterialMaster();
renderMaterialInputs();
renderSites();
</script>

</body>
</html>
