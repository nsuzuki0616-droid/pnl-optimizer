<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>現場利益率管理（マスター強化版）</title>
  <style>
    body { font-family: Arial; padding:20px; background:#f5f5f5; }
    input, select, button { padding:6px; margin:4px; }
    .card { background:white; padding:15px; border-radius:10px; margin-bottom:20px; }
  </style>
</head>
<body>

<div class="card">
  <h2>現場入力</h2>

  <input id="siteName" placeholder="現場名"><br>

  <!-- 作業員選択（マスター） -->
  <h3>作業員（単価別）</h3>
  <div id="workerSelect"></div>

  <!-- 作業員マスター登録 -->
  <input id="newWorkerName" placeholder="作業員名">
  <input id="newWorkerCost" type="number" placeholder="単価">
  <button onclick="addWorker()">作業員追加</button>

  <!-- 材料 -->
  <h3>材料（複数）</h3>
  <div id="materials"></div>

  <input id="newMaterialName" placeholder="材料名">
  <input id="newMaterialCost" type="number" placeholder="単価">
  <button onclick="addMaterial()">材料追加</button>

  <!-- 車両 -->
  <select id="vehicle">
    <option value="0">車両なし</option>
    <option value="3000">軽自動車</option>
    <option value="8000">ダンプ</option>
  </select><br>

  <input id="revenue" type="number" placeholder="売上"><br>
  <button onclick="calculate()">計算</button>

  <p id="result"></p>
</div>

<script>
// 強制動作確認
alert('JS読み込みOK');

// グローバル登録（Vercel対策）
window.addWorker = addWorker;
window.addMaterial = addMaterial;
window.calculate = calcul
// 初期化
window.addEventListener('DOMContentLoaded', () => {
  console.log('アプリ起動');
  renderWorkers();
  renderMaterials();
});

// =====================
// マスター管理
// =====================
function getWorkers(){
  try{
    return JSON.parse(localStorage.getItem('workers')||'[]');
  }catch(e){
    console.error(e);
    return [];
  }
}
function saveWorkers(data){
  localStorage.setItem('workers', JSON.stringify(data));
}

function getMaterials(){
  try{
    return JSON.parse(localStorage.getItem('materials')||'[]');
  }catch(e){
    console.error(e);
    return [];
  }
}
function saveMaterials(data){
  localStorage.setItem('materials', JSON.stringify(data));
}

// =====================
// 作業員
// =====================
function renderWorkers(){
  const div = document.getElementById('workerSelect');
  if(!div) return;

  div.innerHTML='';
  const workers = getWorkers();

  for(let i=0;i<10;i++){
    const select = document.createElement('select');
    select.className='worker';

    const empty = document.createElement('option');
    empty.value='';
    empty.text='選択';
    select.appendChild(empty);

    workers.forEach(w=>{
      const opt = document.createElement('option');
      opt.value = w.cost;
      opt.text = `${w.name} (${w.cost})`;
      select.appendChild(opt);
    });

    div.appendChild(select);
  }
}

function addWorker(){
  console.log('作業員追加クリック');

  const name = document.getElementById('newWorkerName').value.trim();
  const cost = Number(document.getElementById('newWorkerCost').value);

  if(!name || !cost){
    alert('作業員名と単価を入力してください');
    return;
  }

  const workers = getWorkers();
  workers.push({name, cost});
  saveWorkers(workers);

  document.getElementById('newWorkerName').value='';
  document.getElementById('newWorkerCost').value='';

  alert('作業員を保存しました');
  renderWorkers();
}

// =====================
// 材料
// =====================
function renderMaterials(){
  const div = document.getElementById('materials');
  if(!div) return;

  div.innerHTML='';
  const materials = getMaterials();

  for(let i=0;i<20;i++){
    const select = document.createElement('select');
    select.className='material';

    const empty = document.createElement('option');
    empty.value='0';
    empty.text='なし';
    select.appendChild(empty);

    materials.forEach(m=>{
      const opt = document.createElement('option');
      opt.value = m.cost;
      opt.text = `${m.name} (${m.cost})`;
      select.appendChild(opt);
    });

    div.appendChild(select);
  }
}

function addMaterial(){
  console.log('材料追加クリック');

  const name = document.getElementById('newMaterialName').value.trim();
  const cost = Number(document.getElementById('newMaterialCost').value);

  if(!name || !cost){
    alert('材料名と単価を入力してください');
    return;
  }

  const materials = getMaterials();
  materials.push({name, cost});
  saveMaterials(materials);

  document.getElementById('newMaterialName').value='';
  document.getElementById('newMaterialCost').value='';

  alert('材料を保存しました');
  renderMaterials();
}

// =====================
// 計算
// =====================
function calculate(){
  const revenue = Number(document.getElementById('revenue').value)||0;
  const vehicle = Number(document.getElementById('vehicle').value)||0;

  let labor=0;
  document.querySelectorAll('.worker').forEach(w=>{
    labor += Number(w.value)||0;
  });

  let materialCost=0;
  document.querySelectorAll('.material').forEach(m=>{
    materialCost += Number(m.value)||0;
  });

  const totalCost = labor + materialCost + vehicle;
  const profit = revenue - totalCost;
  const margin = revenue ? (profit/revenue)*100 : 0;

  document.getElementById('result').innerText =
    `利益:${profit}円 / 利益率:${margin.toFixed(1)}%`;
}
</script>

</body>
</html>
