<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>現場利益率管理</title>
  <style>
    body { font-family: Arial; padding:20px; background:#f5f5f5; }
    input, button { padding:8px; margin:5px; }
    .card { background:white; padding:15px; border-radius:10px; margin-bottom:20px; }
  </style>
</head>
<body>

<div class="card">
  <h2>現場入力（ローカル保存版）</h2>
  <input id="siteName" placeholder="現場名"><br>
  <input id="date" type="date"><br>
  <input id="revenue" type="number" placeholder="売上"><br>
  <input id="cost" type="number" placeholder="経費"><br>
  <button type="button" onclick="calculate()">計算</button>
  <button type="button" onclick="save()">保存</button>

  <p id="result"></p>
</div>

<div class="card">
  <h2>保存データ（このPCのみ）</h2>
  <div id="list"></div>
</div>

<script>
// =============================
// 計算
// =============================
function calculate(){
  const revenue = Number(document.getElementById('revenue').value) || 0;
  const cost = Number(document.getElementById('cost').value) || 0;

  const profit = revenue - cost;
  const margin = revenue ? (profit / revenue) * 100 : 0;

  document.getElementById('result').innerText =
    `利益: ${profit}円 / 利益率: ${margin.toFixed(1)}%`;
}

// =============================
// 保存（localStorage）
// =============================
function save(){
  const siteName = document.getElementById('siteName').value;
  const revenue = Number(document.getElementById('revenue').value);
  const cost = Number(document.getElementById('cost').value);
  const date = document.getElementById('date').value;

  const profit = revenue - cost;
  const margin = revenue ? (profit / revenue) * 100 : 0;

  const data = { siteName, revenue, cost, profit, margin, date };

  const saved = JSON.parse(localStorage.getItem('sites') || '[]');
  saved.push(data);

  localStorage.setItem('sites', JSON.stringify(saved));

  alert('保存しました');
  load();
}

// =============================
// 読み込み
// =============================
function load(){
  const list = document.getElementById('list');
  list.innerHTML = '';

  const saved = JSON.parse(localStorage.getItem('sites') || '[]');

  saved.forEach(d => {
    const div = document.createElement('div');
    div.innerText = `${d.siteName} / ${d.profit}円`;
    list.appendChild(div);
  });
}

// 初期ロード
load();
</script>

</body>
</html>
