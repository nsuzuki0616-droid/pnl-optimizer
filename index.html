<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>現場利益率管理</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { font-family: Arial; padding:20px; background:#f5f5f5; }
    input, button { padding:8px; margin:5px; }
    .card { background:white; padding:15px; border-radius:10px; margin-bottom:20px; }
  </style>
</head>
<body>

<div class="card">
  <h2>現場入力</h2>
  <input id="siteName" placeholder="現場名"><br>
  <input id="date" type="date"><br>
  <input id="revenue" type="number" placeholder="売上"><br>
  <input id="cost" type="number" placeholder="経費"><br>
  <button onclick="calculate()">計算</button>
  <button onclick="save()">保存</button>

  <p id="result"></p>
</div>

<div class="card">
  <h2>共有データ</h2>
  <div id="list"></div>
</div>

<script>
const supabase = supabase.createClient(
  "https://YOUR_PROJECT_ID.supabase.co",
  "YOUR_ANON_KEY"
);

function calculate(){
  const revenue = Number(document.getElementById('revenue').value) || 0;
  const cost = Number(document.getElementById('cost').value) || 0;

  const profit = revenue - cost;
  const margin = revenue ? (profit / revenue) * 100 : 0;

  document.getElementById('result').innerText =
    `利益: ${profit}円 / 利益率: ${margin.toFixed(1)}%`;
}

async function save(){
  const siteName = document.getElementById('siteName').value;
  const revenue = Number(document.getElementById('revenue').value);
  const cost = Number(document.getElementById('cost').value);
  const date = document.getElementById('date').value;

  const profit = revenue - cost;
  const margin = revenue ? (profit / revenue) * 100 : 0;

  const { error } = await supabase
    .from('sites')
    .insert([{ siteName, revenue, otherCost: cost, profit, margin, date }]);

  if(error){
    alert('保存エラー');
    console.log(error);
  } else {
    alert('保存成功');
    load();
  }
}

async function load(){
  const { data, error } = await supabase
    .from('sites')
    .select('*');

  const list = document.getElementById('list');
  list.innerHTML = '';

  data?.forEach(d => {
    const div = document.createElement('div');
    div.innerText = `${d.siteName} / ${d.profit}円`;
    list.appendChild(div);
  });
}

load();
</script>

</body>
</html>
