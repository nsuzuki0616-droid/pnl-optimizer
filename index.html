<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>現場利益率管理（修正版）</title>
</head>
<body>

<h2>テスト</h2>
<button onclick="testClick()">テストボタン</button>

<hr>

<h2>作業員追加</h2>
<input id="newWorkerName" placeholder="名前">
<input id="newWorkerCost" type="number" placeholder="単価">
<button onclick="addWorker()">追加</button>

<div id="workerList"></div>

<script>
// 強制確認
alert('JS読み込みOK');

function testClick(){
  alert('ボタン動作OK');
}

function getWorkers(){
  return JSON.parse(localStorage.getItem('workers') || '[]');
}

function saveWorkers(data){
  localStorage.setItem('workers', JSON.stringify(data));
}

function renderWorkers(){
  const list = document.getElementById('workerList');
  list.innerHTML = '';

  const workers = getWorkers();

  workers.forEach(w => {
    const div = document.createElement('div');
    div.innerText = w.name + ' / ' + w.cost;
    list.appendChild(div);
  });
}

function addWorker(){
  alert('クリック検知');

  const name = document.getElementById('newWorkerName').value;
  const cost = Number(document.getElementById('newWorkerCost').value);

  if(!name || !cost){
    alert('入力してください');
    return;
  }

  const workers = getWorkers();
  workers.push({name, cost});
  saveWorkers(workers);

  alert('保存成功');
  renderWorkers();
}

renderWorkers();
</script>

</body>
</html>
